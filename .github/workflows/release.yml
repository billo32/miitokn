name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2

  macos:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: macos-latest
    env:
      # Avoids unauthenticated cargo-binstall hitting GitHub API rate limits.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        # --targets: tauri-cli ships both aarch64 and x86_64 macOS binaries,
        # but cargo-binstall's own arch detection picks x86_64 on this runner
        # (then runs under Rosetta) unless pinned explicitly — mislabels the
        # DMG "x64" even though the app itself builds natively arm64.
        # --force: Swatinem/rust-cache restores ~/.cargo's install manifest
        # but not always the ~/.cargo/bin binary itself, so a cached "already
        # installed" can leave `cargo tauri` missing — force always reinstalls.
        run: cargo binstall tauri-cli --no-confirm --locked --force --targets aarch64-apple-darwin

      - name: Build, sign and notarize app
        working-directory: src-tauri
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: cargo tauri build

      # Tauri notarizes and staples only the .app; the DMG itself needs its own
      # notarization or Gatekeeper rejects it as "Unnotarized Developer ID".
      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(ls src-tauri/target/release/bundle/dmg/*.dmg)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          spctl --assess --type open --context context:primary-signature -v "$DMG"

      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg

  windows:
    needs: [create-release]
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Build NSIS installer
        working-directory: src-tauri
        run: cargo tauri build --bundles nsis

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/nsis/*-setup.exe
